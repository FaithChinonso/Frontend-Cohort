<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Tasty Bites — Tailwind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-amber-50 text-stone-800 font-serif">

    <header class="bg-red-600 text-white px-6 py-5 flex flex-col md:flex-row md:justify-between md:items-center gap-3">
      <h1 class="text-2xl font-bold m-0 text-center md:text-left">Tasty Bites</h1>
      <nav class="flex justify-center gap-4">
        <a href="index.html" class="font-bold hover:underline">Home</a>
        <a href="#" class="font-bold hover:underline">Recipes</a>
        <a href="#" class="font-bold hover:underline">About</a>
      </nav>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">

      <section class="text-center mb-8">
        <h2 class="text-3xl md:text-4xl font-bold text-red-600 mb-2">Recipes worth making</h2>
        <p class="text-stone-600">Simple, tested, and unfussy.</p>
      </section>

      <section class="flex flex-col items-center gap-4 mb-8">
        <input
          type="search"
          id="search"
          placeholder="Search recipes..."
          class="w-full max-w-md px-5 py-2 rounded-full border-2 border-stone-200 bg-white focus:outline-none focus:border-red-500 text-base"
        />
        <div class="flex flex-wrap justify-center gap-2">
          <button class="filter-btn active px-4 py-1.5 rounded-full border-2 border-stone-200 bg-white text-sm hover:border-red-500 transition" data-category="all">All</button>
          <button class="filter-btn px-4 py-1.5 rounded-full border-2 border-stone-200 bg-white text-sm hover:border-red-500 transition" data-category="Breakfast">Breakfast</button>
          <button class="filter-btn px-4 py-1.5 rounded-full border-2 border-stone-200 bg-white text-sm hover:border-red-500 transition" data-category="Lunch">Lunch</button>
          <button class="filter-btn px-4 py-1.5 rounded-full border-2 border-stone-200 bg-white text-sm hover:border-red-500 transition" data-category="Dinner">Dinner</button>
          <button class="filter-btn px-4 py-1.5 rounded-full border-2 border-stone-200 bg-white text-sm hover:border-red-500 transition" data-category="Dessert">Dessert</button>
        </div>
      </section>

      <section class="recipe-grid grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></section>
    </main>

    <footer class="text-center text-stone-500 text-sm py-8">
      <p>&copy; 2026 Tasty Bites.</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
