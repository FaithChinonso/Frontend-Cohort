<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Tasty Bites — Tailwind</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:ital@1&display=swap"
    />

    <script>
      window.tailwind = {
        config: {
          theme: {
            extend: {
              colors: {
                cream:      '#FAF6EF',
                paper:      '#F3ECDF',
                espresso:   '#2B1D13',
                terracotta: '#C2563A',
                sage:       '#7A8A6B',
                rule:       '#E4D9C5',
              },
              fontFamily: {
                display: ['"DM Serif Display"', 'serif'],
                body:    ['Inter', 'system-ui', 'sans-serif'],
                accent:  ['"Cormorant Garamond"', 'serif'],
              },
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-cream text-espresso font-body">

    <header class="bg-terracotta text-cream px-6 py-5 flex flex-col md:flex-row md:justify-between md:items-center gap-3">
      <h1 class="font-display text-2xl md:text-3xl m-0 text-center md:text-left">Tasty Bites</h1>
      <nav class="flex flex-wrap justify-center gap-1">
        <a href="index.html" class="px-3 py-1 rounded-full font-medium hover:bg-white/20 transition no-underline text-cream">Home</a>
        <a href="#" class="px-3 py-1 rounded-full font-medium hover:bg-white/20 transition no-underline text-cream">Recipes</a>
        <a href="#" class="px-3 py-1 rounded-full font-medium hover:bg-white/20 transition no-underline text-cream">About</a>
      </nav>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-10">

      <section class="text-center mb-10">
        <p class="text-terracotta text-sm uppercase tracking-[0.18em] font-semibold mb-2">— Browse the kitchen —</p>
        <h2 class="font-display text-4xl md:text-5xl text-espresso text-balance mb-2 leading-tight">Recipes worth making</h2>
        <p class="text-espresso/65">Simple, tested, and unfussy.</p>
      </section>

      <section class="flex flex-col items-center gap-5 mb-10">
        <input
          type="search"
          id="search"
          placeholder="Search recipes..."
          class="w-full max-w-md px-5 py-2.5 rounded-full border border-rule bg-paper text-espresso placeholder:italic placeholder:font-accent placeholder:text-espresso/40 focus:outline-none focus:border-terracotta focus:ring-4 focus:ring-terracotta/15 transition"
        />
        <div class="flex flex-wrap justify-center gap-2">
          <button class="filter-btn active px-4 py-1.5 rounded-full border border-rule bg-paper text-espresso text-sm font-semibold tracking-wide hover:border-terracotta hover:text-terracotta transition" data-category="all">All</button>
          <button class="filter-btn px-4 py-1.5 rounded-full border border-rule bg-paper text-espresso text-sm font-semibold tracking-wide hover:border-terracotta hover:text-terracotta transition" data-category="Breakfast">Breakfast</button>
          <button class="filter-btn px-4 py-1.5 rounded-full border border-rule bg-paper text-espresso text-sm font-semibold tracking-wide hover:border-terracotta hover:text-terracotta transition" data-category="Lunch">Lunch</button>
          <button class="filter-btn px-4 py-1.5 rounded-full border border-rule bg-paper text-espresso text-sm font-semibold tracking-wide hover:border-terracotta hover:text-terracotta transition" data-category="Dinner">Dinner</button>
          <button class="filter-btn px-4 py-1.5 rounded-full border border-rule bg-paper text-espresso text-sm font-semibold tracking-wide hover:border-terracotta hover:text-terracotta transition" data-category="Dessert">Dessert</button>
        </div>
      </section>

      <section class="recipe-grid grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></section>
    </main>

    <footer class="text-center text-espresso/55 text-sm py-6">
      <p>&copy; 2026 Tasty Bites.</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
